<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<title>WebGPU Rotating Cube – Screensaver</title>
	<style>
		:root {
			color-scheme: light dark;
			font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
		}
		
		html, body {
			margin: 0;
			height: 100%;
			display: flex;
			align-items: center;
			justify-content: center;
			background: #1a1a1a; /* Nền ngoài cùng tối hơn một chút */
			color: #ffffff;
		}

		/* Khung chứa toàn bộ nội dung để UI gọn gàng hơn */
		.app-container {
			background: #2a2a2a;
			padding: 30px;
			border-radius: 16px;
			box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
			display: flex;
			flex-direction: column;
			align-items: center;
			max-width: 90vw;
		}

		/* Tên Website */
		.web-title {
			margin-top: 0;
			margin-bottom: 20px;
			font-size: 28px;
			font-weight: 600;
			letter-spacing: 1.5px;
			color: #e0e0e0;
			text-transform: uppercase;
		}

		/* Khung hiển thị WebGPU */
		canvas {
			width: 600px;
			height: 600px;
			max-width: 100%;
			display: block;
			background: #111;
			border: 2px solid #444; /* Viền canvas */
			border-radius: 8px; /* Bo góc nhẹ cho canvas */
			box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.8);
		}

		/* Tab thông tin sinh viên ở dưới */
		.student-info-tab {
			margin-top: 25px;
			padding: 15px 20px;
			background: #333;
			border: 1px solid #444;
			border-radius: 8px;
			width: 100%;
			box-sizing: border-box;
			display: flex;
			justify-content: space-around;
			flex-wrap: wrap;
			gap: 15px;
		}

		.info-item {
			display: flex;
			gap: 8px;
			font-size: 16px;
		}

		.info-label {
			font-weight: 600;
			color: #999;
		}

		.info-value {
			font-weight: 400;
			color: #fff;
		}
	</style>
</head>
<body>
	<div class="app-container">
		<h1 class="web-title">WebGPU Rotating Cube</h1>
		
		<canvas></canvas>
		
		<div class="student-info-tab">
			<div class="info-item">
				<span class="info-label">Student Name:</span>
				<span class="info-value">Lê Hoàng Bách Đạt</span>
			</div>
			<div class="info-item">
				<span class="info-label">Student ID:</span>
				<span class="info-value">22127061</span>
			</div>
		</div>
	</div>

	<script type="module" src="main.js"></script>
</body>
</html>
