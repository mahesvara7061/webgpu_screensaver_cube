<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<title>WebGPU Screensaver Rotating Cube </title>
	<style>
		/* Import font chữ từ Google Fonts */
		@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@400;600&display=swap');

		:root {
			color-scheme: light dark;
		}

		html, body {
			margin: 0;
			height: 100%;
			display: flex;
			align-items: center;
			justify-content: center;
			/* Nền Gradient chuyển động */
			background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #0f0c29);
			background-size: 400% 400%;
			animation: gradientBG 15s ease infinite;
			font-family: 'Inter', sans-serif;
			color: #ffffff;
			overflow: hidden;
		}

		/* Animation cho nền */
		@keyframes gradientBG {
			0% { background-position: 0% 50%; }
			50% { background-position: 100% 50%; }
			100% { background-position: 0% 50%; }
		}

		/* Khung chứa hiệu ứng kính mờ (Glassmorphism) */
		.app-container {
			background: rgba(20, 20, 30, 0.55);
			backdrop-filter: blur(12px);
			-webkit-backdrop-filter: blur(12px); /* Hỗ trợ Safari */
			padding: 40px;
			border-radius: 24px;
			border: 1px solid rgba(255, 255, 255, 0.08);
			box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
			display: flex;
			flex-direction: column;
			align-items: center;
			max-width: 90vw;
		}

		/* Tiêu đề hiệu ứng chữ Neon */
		.web-title {
			font-family: 'Orbitron', sans-serif;
			margin-top: 0;
			margin-bottom: 25px;
			font-size: 32px;
			letter-spacing: 2px;
			background: linear-gradient(90deg, #00f2fe, #4facfe);
			-webkit-background-clip: text;
			-webkit-text-fill-color: transparent;
			text-shadow: 0px 0px 20px rgba(0, 242, 254, 0.4);
			text-transform: uppercase;
		}

		/* Canvas với viền phát sáng */
		canvas {
			width: 600px;
			height: 600px;
			max-width: 100%;
			display: block;
			background: #050505;
			border: 1px solid rgba(0, 242, 254, 0.2);
			border-radius: 12px;
			box-shadow: 0 0 30px rgba(0, 242, 254, 0.15), inset 0 0 20px rgba(0, 0, 0, 0.8);
			transition: box-shadow 0.3s ease;
		}

		/* Tăng độ sáng khi hover vào canvas */
		canvas:hover {
			box-shadow: 0 0 40px rgba(0, 242, 254, 0.35), inset 0 0 20px rgba(0, 0, 0, 0.8);
		}

		/* Khu vực thông tin sinh viên */
		.student-info-tab {
			margin-top: 30px;
			width: 100%;
			display: flex;
			justify-content: center;
			gap: 20px;
			flex-wrap: wrap;
		}

		/* Thẻ hiển thị thông tin từng mục (Card effect) */
		.info-card {
			background: rgba(255, 255, 255, 0.03);
			border: 1px solid rgba(255, 255, 255, 0.05);
			padding: 12px 24px;
			border-radius: 12px;
			display: flex;
			gap: 12px;
			align-items: center;
			transition: all 0.3s ease;
			box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
		}

		/* Hiệu ứng nổi lên khi hover vào thẻ thông tin */
		.info-card:hover {
			transform: translateY(-5px);
			background: rgba(255, 255, 255, 0.08);
			border-color: rgba(0, 242, 254, 0.3);
			box-shadow: 0 12px 20px rgba(0, 242, 254, 0.15);
		}

		.info-label {
			font-size: 13px;
			font-weight: 600;
			color: #8c8cbe;
			text-transform: uppercase;
			letter-spacing: 1px;
		}

		.info-value {
			font-size: 16px;
			font-weight: 600;
			color: #e0e0ff;
			letter-spacing: 0.5px;
		}
	</style>
</head>
<body>
	<div class="app-container">
		<h1 class="web-title">WebGPU Screensaver Rotating Cube</h1>
		
		<canvas></canvas>
		
		<div class="student-info-tab">
			<div class="info-card">
				<span class="info-label">Student Name:</span>
				<span class="info-value">Lê Hoàng Bách Đạt</span>
			</div>
			<div class="info-card">
				<span class="info-label">Student ID:</span>
				<span class="info-value">22127061</span>
			</div>
		</div>
	</div>

	<script type="module" src="main.js"></script>
</body>
</html>
